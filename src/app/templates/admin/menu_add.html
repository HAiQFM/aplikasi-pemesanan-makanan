<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tambah Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <header>
        <h1>Tambah Menu</h1>
        <nav>
            <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('admin.menu_list') }}">Kelola Menu</a>
            <a href="{{ url_for('admin.categories') }}">Kategori</a>
            <a href="{{ url_for('admin.orders') }}">Pesanan</a>
            <form method="post" action="{{ url_for('auth.logout_admin') }}" class="nav-inline-form">
                <button type="submit" class="nav-logout">Logout Admin</button>
            </form>
        </nav>
    </header>

    <main>
        <section>
            <h2>Form Menu Baru</h2>
            <form method="post" action="{{ url_for('admin.menu_add') }}">
                <p>
                    <label for="name">Nama Menu</label><br>
                    <input type="text" id="name" name="name" required>
                </p>
                <p>
                    <label for="category_id">Kategori</label><br>
                    <select id="category_id" name="category_id" required>
                        <option value="">-- Pilih Kategori --</option>
                    </select>
                </p>
                <p>
                    <label for="price">Harga</label><br>
                    <input type="number" id="price" name="price" min="0" step="0.01" required>
                </p>
                <p>
                    <label for="description">Deskripsi</label><br>
                    <textarea id="description" name="description" rows="4"></textarea>
                </p>
                <p>
                    <label for="image_url">URL Gambar</label><br>
                    <input type="url" id="image_url" name="image_url">
                </p>
                <p>
                    <label>
                        <input type="checkbox" name="is_available" checked>
                        Tersedia
                    </label>
                </p>
                <p>
                    <button type="submit">Simpan</button>
                    <a href="{{ url_for('admin.menu_list') }}">Batal</a>
                </p>
            </form>
        </section>
</main>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
