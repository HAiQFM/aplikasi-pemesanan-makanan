<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daftar Menu Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <header>
        <h1>Kelola Menu</h1>
        <nav>
            <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('admin.menu_list') }}">Kelola Menu</a>
            <a href="{{ url_for('admin.categories') }}">Kategori</a>
            <a href="{{ url_for('admin.orders') }}">Pesanan</a>
            <form method="post" action="{{ url_for('auth.logout_admin') }}" class="nav-inline-form">
                <button type="submit" class="nav-logout">Logout Admin</button>
            </form>
        </nav>
    </header>

    <main>
        <section>
            <a href="{{ url_for('admin.menu_add') }}">+ Tambah Menu</a>
        </section>

        <section>
            <h2>Daftar Menu</h2>
            <table border="1" cellpadding="8" cellspacing="0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6">Belum ada data menu.</td>
                    </tr>
                </tbody>
            </table>
        </section>
</main>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
