<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <header>
        <h1>Edit Menu</h1>
        <nav>
            <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
            <a class="is-active" href="{{ url_for('admin.menu_list') }}">Kelola Menu</a>
            <a href="{{ url_for('admin.categories') }}">Kategori</a>
            <a href="{{ url_for('admin.ingredients') }}">Bahan Baku</a>
            <a href="{{ url_for('admin.orders') }}">Pesanan</a>
            <form method="post" action="{{ url_for('auth.logout_admin') }}" class="nav-inline-form">
                <button type="submit" class="nav-logout">Logout Admin</button>
            </form>
        </nav>
    </header>

    <main>
        <section>
            <div class="section-head">
                <div>
                    <h2>Form Edit Menu</h2>
                    <p class="section-subtitle">Perbarui data menu tanpa mengubah gaya halaman admin yang lain.</p>
                </div>
                <span class="report-date">ID {{ menu.id }}</span>
            </div>

            <form method="post" class="admin-form-grid">
                <p>
                    <label for="name">Nama Menu</label>
                    <input type="text" id="name" name="name" value="{{ menu.name }}" required>
                </p>
                <p>
                    <label for="category_id">Kategori</label>
                    <select id="category_id" name="category_id" required>
                        <option value="">-- Pilih Kategori --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if cat.id == menu.category_id %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </p>
                <p>
                    <label for="price">Harga</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" value="{{ menu.price }}" required>
                </p>
                <p>
                    <label for="image_url">Nama File Gambar</label>
                    <input type="text" id="image_url" name="image_url" value="{{ menu.image_url or '' }}" placeholder="Contoh: nasi-ayam.jpg">
                </p>
                <p class="admin-form-full">
                    <label for="description">Deskripsi</label>
                    <textarea id="description" name="description" rows="4">{{ menu.description or '' }}</textarea>
                </p>
                <p class="admin-form-full inline-checkbox">
                    <label>
                        <input type="checkbox" name="is_available" value="1" {% if menu.is_available %}checked{% endif %}>
                        Tersedia
                    </label>
                </p>
                <p class="admin-form-full form-actions">
                    <button type="submit">Update</button>
                    <a class="pill-link muted-link" href="{{ url_for('admin.menu_list') }}">Batal</a>
                </p>
            </form>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
