<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <header>
        <h1>Edit Menu</h1>
        <nav>
            <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('admin.menu_list') }}">Kelola Menu</a>
            <a href="{{ url_for('admin.categories') }}">Kategori</a>
            <a href="{{ url_for('admin.orders') }}">Pesanan</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Form Edit Menu</h2>
            <p>ID Menu: {{ menu_id if menu_id is defined else "-" }}</p>
            <form method="post">
                <p>
                    <label for="name">Nama Menu</label><br>
                    <input type="text" id="name" name="name" value="{{ menu.name if menu is defined else '' }}" required>
                </p>
                <p>
                    <label for="category_id">Kategori</label><br>
                    <select id="category_id" name="category_id" required>
                        <option value="">-- Pilih Kategori --</option>
                    </select>
                </p>
                <p>
                    <label for="price">Harga</label><br>
                    <input type="number" id="price" name="price" min="0" step="0.01" value="{{ menu.price if menu is defined else '' }}" required>
                </p>
                <p>
                    <label for="description">Deskripsi</label><br>
                    <textarea id="description" name="description" rows="4">{{ menu.description if menu is defined else '' }}</textarea>
                </p>
                <p>
                    <label for="image_url">URL Gambar</label><br>
                    <input type="url" id="image_url" name="image_url" value="{{ menu.image_url if menu is defined else '' }}">
                </p>
                <p>
                    <label>
                        <input type="checkbox" name="is_available" {% if menu is not defined or menu.is_available %}checked{% endif %}>
                        Tersedia
                    </label>
                </p>
                <p>
                    <button type="submit">Update</button>
                    <a href="{{ url_for('admin.menu_list') }}">Batal</a>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
