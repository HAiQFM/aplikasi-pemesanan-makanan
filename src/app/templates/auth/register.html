<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet" />
  <title>Registrasi - Aplikasi Pemesanan Makanan</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-topbar">
        <a class="auth-back" href="{{ url_for('main.index') }}" aria-label="Kembali">&#8592;</a>
      </div>
      <img class="auth-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Food Hall - Warung Nasi Teh Sarah Logo" />
      <h1>Daftar Akun</h1>
      <p class="subtitle">Buat akun baru untuk mulai memesan makanan.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <ul class="flash-list">
            {% for category, message in messages %}
              <li class="flash flash-{{ category }}">{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

       <form method="post" action="{{ url_for('auth.register') }}" class="auth-form">
         <label for="name">Nama</label>
         <input id="name" name="name" type="text" placeholder="Masukkan nama lengkap" required />

         <label for="email">Email</label>
         <input id="email" name="email" type="email" placeholder="nama@email.com" required />

         <label for="password">Password</label>
         <div class="password-input-wrapper">
           <input id="password" name="password" type="password" placeholder="Minimal 8 karakter" minlength="8" required />
           <button type="button" class="password-toggle" aria-label="Tampilkan password" aria-pressed="false" data-target="password">
             <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
               <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
               <circle cx="12" cy="12" r="3"></circle>
             </svg>
             <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none;">
               <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
               <line x1="1" y1="1" x2="23" y2="23"></line>
             </svg>
           </button>
         </div>

         <label for="confirm_password">Konfirmasi Password</label>
         <div class="password-input-wrapper">
           <input id="confirm_password" name="confirm_password" type="password" placeholder="Ulangi password" minlength="8" required />
           <button type="button" class="password-toggle" aria-label="Tampilkan password" aria-pressed="false" data-target="confirm_password">
             <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
               <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
               <circle cx="12" cy="12" r="3"></circle>
             </svg>
             <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none;">
               <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
               <line x1="1" y1="1" x2="23" y2="23"></line>
             </svg>
           </button>
         </div>

         <button type="submit">Daftar</button>
       </form>

      <p class="switch-link">
        Sudah punya akun?
        <a href="{{ url_for('auth.login') }}">Login di sini</a>
      </p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
