<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet" />
  <title>Login - Aplikasi Pemesanan Makanan</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-topbar">
        <a class="auth-back" href="{{ url_for('main.index') }}" aria-label="Kembali">&#8592;</a>
      </div>
      <img class="auth-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Food Hall Logo" />
      <h1>Masuk</h1>
      <p class="subtitle">Silakan login untuk melanjutkan pemesanan bahan makanan segar.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <ul class="flash-list">
            {% for category, message in messages %}
              <li class="flash flash-{{ category }}">{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="nama@email.com" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Masukkan password" required />

        <button type="submit">Login</button>
      </form>

      <p class="switch-link">
        Belum punya akun?
        <a href="{{ url_for('auth.register') }}">Daftar di sini</a>
      </p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
